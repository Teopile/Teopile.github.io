<style>
  :root{--gold:#E0A93E;--ink:#2A2E36;--muted:#6B7079;--bg:#F6F7F9;--card:#fff;--line:#DDE0E4}
  *{box-sizing:border-box}body{margin:0;font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:20px}
  .card{background:var(--card);max-width:520px;width:100%;border-radius:20px;overflow:hidden;
    box-shadow:0 8px 40px rgba(0,0,0,.10);border:1px solid var(--line)}
  .hero{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:#EFE7D2}
  .placeholder{display:flex;align-items:center;justify-content:center;font-size:54px;color:#caa85e}
  .body{padding:22px 24px 26px}
  h1{font-size:24px;margin:0 0 6px;letter-spacing:-.3px}
  .meta{color:var(--gold);font-weight:600;font-size:13px;margin:0 0 14px}
  p.desc{color:#41464e;line-height:1.6;font-size:15px;margin:0 0 22px}
  .btns{display:flex;flex-direction:column;gap:10px}
  a.btn{display:flex;align-items:center;justify-content:center;text-decoration:none;font-weight:600;
    height:52px;border-radius:14px;font-size:16px}
  a.primary{background:var(--gold);color:#1d1606}
  a.ghost{background:#EFF1F4;color:var(--ink);border:1px solid var(--line)}
  .credit{margin:14px 0 0;font-size:11px;color:var(--muted)}
  .credit a{color:var(--muted)}
  .wordmark{text-align:center;margin:18px 0 0;font-size:12px;color:var(--muted);letter-spacing:.4px}
</style>
</head>
<body>
  <div class="card">
    <img class="hero" src="/img/jumati.jpg" alt="ჯუმათის მონასტერი">
    <div class="body">
      <h1>ჯუმათის მონასტერი</h1>
      <div class="meta">მონასტერი · ზუგდიდი, სამეგრელო · XI ს.</div>
      <p class="desc">XI საუკუნის მონასტერი სამეგრელოში. ცნობილია ღვთისმშობლის ხატით.</p>
      <div class="btns">
        <a class="btn primary" id="open" href="locvani://church/jumati">აპლიკაციაში გახსნა</a>
        <a class="btn ghost" id="get" href="https://apps.apple.com/app/id000000000">აპლიკაციის ჩამოტვირთვა</a>
      </div>
      <p class="credit"><a href="https://commons.wikimedia.org/wiki/File:Djumati_Monastery.jpg" target="_blank" rel="noopener">ფოტო: M. · CC BY-SA 4.0 ↗</a></p>
      <div class="wordmark">ლოცვანი · Georgian Orthodox</div>
    </div>
  </div>
  <script>
    (function () {
      var ua = navigator.userAgent || '';
      if (/android/i.test(ua)) document.getElementById('get').href = "https://play.google.com/store/apps/details?id=com.locvani.app";
    })();
  </script>
</body>
</html>
