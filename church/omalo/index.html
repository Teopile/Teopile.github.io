<style>
:root{
  --bg:#F6F7F9;--surface:#FFFFFF;--surface2:#EFF1F4;
  --ink:#2A2E36;--muted:#6B7079;--line:#DDE0E4;
  --gold:#E0A93E;--gold-ink:#A87420;--gold-deep:#7E5618;--gold-wash:#F7EEDA;
  --red:#B53C2D;
}
@font-face{font-family:"Locvani Serif";src:url("/fonts/NotoSerifGeorgian-Regular.ttf") format("truetype");font-weight:400;font-display:swap}
@font-face{font-family:"Locvani Serif";src:url("/fonts/NotoSerifGeorgian-Bold.ttf") format("truetype");font-weight:700;font-display:swap}
*{box-sizing:border-box;margin:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Georgian",sans-serif;
  line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.serif{font-family:"Locvani Serif",Georgia,serif}
a{color:var(--gold-ink);text-decoration:none}
img{display:block;max-width:100%}
.wrap{max-width:760px;margin:0 auto;padding:0 22px}
.mark{display:inline-flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.3px}
.mark .cross{color:var(--gold);font-size:1.05em;line-height:1}
header.site{padding:20px 0}
header.site .mark{font-size:19px}
footer.site{border-top:1px solid var(--line);margin-top:56px;padding:26px 0 40px;color:var(--muted);font-size:13px}
footer.site nav{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px}
footer.site a{color:var(--muted)}
.doc h1{font-family:"Locvani Serif",Georgia,serif;font-size:30px;line-height:1.2;margin:8px 0 18px}
.doc h2{font-family:"Locvani Serif",Georgia,serif;font-size:21px;margin:28px 0 8px}
.doc h3{font-size:16px;margin:20px 0 6px;color:var(--gold-deep)}
.doc p,.doc li{font-size:15.5px;color:#3a3f48}
.doc ul{margin:8px 0 8px 18px}
.doc{padding-bottom:8px}
</style>
</head>
<body>

<header class="site"><div class="wrap"><a class="mark serif" href="/"><span class="cross">✟</span> ლოცვანი</a></div></header>
<main class="wrap">
  <style>
  .card{background:var(--surface);max-width:560px;margin:8px auto 0;border-radius:22px;overflow:hidden;
    border:1px solid var(--line);box-shadow:0 10px 40px rgba(20,20,20,.07)}
  .card .hero{width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--gold-wash)}
  .card .ph{display:flex;align-items:center;justify-content:center;font-size:60px;color:#caa85e}
  .card .body{padding:22px 24px 26px}
  .card h1{font-family:"Locvani Serif",Georgia,serif;font-size:25px;line-height:1.2;margin-bottom:6px}
  .card .meta{color:var(--gold-deep);font-weight:600;font-size:13px;margin-bottom:14px}
  .card p.desc{color:#3a3f48;font-size:15.5px;margin-bottom:22px}
  .btns{display:flex;flex-direction:column;gap:10px}
  .btn{display:flex;align-items:center;justify-content:center;height:52px;border-radius:14px;font-weight:700;font-size:16px}
  .btn.primary{background:var(--gold);color:#1d1606}
  .btn.ghost{background:var(--surface2);color:var(--ink);border:1px solid var(--line)}
  .credit{margin:14px 0 0;font-size:11.5px;color:var(--muted)}
  .credit a{color:var(--muted)}
  .back{display:inline-block;margin:2px 0 0;color:var(--muted);font-size:13px}
  </style>
  <div class="card">
    <div class="hero ph">✟</div>
    <div class="body">
      <h1 class="serif">ომალოს ეკლესია</h1>
      <div class="meta">ეკლესია · ომალო, თუშეთი · XVIII ს.</div>
      <p class="desc">თუშეთის მთავარი სოფლის ისტორიული ეკლესია. მდებარეობს 1900 მეტრ სიმაღლეზე.</p>
      <div class="btns">
        <a class="btn primary" href="locvani://church/omalo">აპლიკაციაში გახსნა</a>
        <a class="btn ghost" href="/">ლოცვანის შესახებ</a>
      </div>
      
    </div>
  </div>
  <p style="text-align:center"><a class="back" href="/">← ლოცვანი</a></p>
</main>
<footer class="site"><div class="wrap">
  <nav>
    <a href="/privacy">კონფიდენციალურობა</a>
    <a href="/terms">წესები</a>
    <a href="/support">დახმარება</a>
  </nav>
  <div>ლოცვანი — ქართული მართლმადიდებლური ლოცვანი. სრულად ოფლაინ. თრექინგის გარეშე.</div>
</div></footer>
</body>
</html>
